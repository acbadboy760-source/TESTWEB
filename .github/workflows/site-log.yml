name: DDoS Target with Log & Optional Shield

on:
  workflow_dispatch:
    inputs:
      protection:
        description: 'محافظت DDoS (rate limit)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

permissions:
  contents: write

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 دریافت مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ تنظیمات Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🏗️ ساخت سرور با لاگ‌گیر و محافظ اختیاری
        run: |
          cat > server.py << 'PYEOF'
          import http.server
          import socketserver
          import os, subprocess, threading, time
          from datetime import datetime
          from collections import defaultdict

          LOG_FILE = "visitor_log.txt"
          ENABLE_PROTECTION = os.environ.get("PROTECTION", "no") == "yes"
          RATE_LIMIT = 20
          BURST = 50

          HTML_PAGE = """<!DOCTYPE html>
          <html>
          <head><title>Test Target</title></head>
          <body style="background:#111;color:#0f0;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;">
              <h1>🟢 Server is alive</h1>
          </body>
          </html>"""

          if ENABLE_PROTECTION:
              ip_request_times = defaultdict(list)
              print("🛡️ محافظت DDoS (Rate Limiting) فعال است.")
          else:
              print("⚡ بدون محافظت – تمام درخواست‌ها پذیرفته می‌شوند.")

          class LoggingHandler(http.server.BaseHTTPRequestHandler):
              def log_message(self, format, *args):
                  pass  # سایلنت کردن لاگ‌های پیش‌فرض

              def do_GET(self):
                  now = datetime.now()
                  timestamp = now.strftime('%Y-%m-%d %H:%M:%S')
                  ip = self.client_address[0]
                  ua = self.headers.get('User-Agent', 'unknown')
                  ref = self.headers.get('Referer', 'direct')
                  status_code = 200

                  # اعمال Rate Limiting در صورت فعال بودن محافظت
                  if ENABLE_PROTECTION:
                      ip_request_times[ip] = [t for t in ip_request_times[ip] if (now - t).total_seconds() < 1.0]
                      if len(ip_request_times[ip]) >= RATE_LIMIT + BURST:
                          status_code = 429
                      else:
                          ip_request_times[ip].append(now)

                  # ثبت بازدید در لاگ
                  log_line = f"[{timestamp}] {ip} | {ua[:80]} | Referer: {ref} | Path: {self.path} | Status: {status_code}\n"
                  with open(LOG_FILE, 'a') as f:
                      f.write(log_line)
                  print(f"📥 {ip} → {status_code}", flush=True)

                  # ارسال پاسخ
                  self.send_response(status_code)
                  if status_code == 429:
                      self.send_header('Content-type', 'text/plain')
                      self.end_headers()
                      self.wfile.write(b"Rate limit exceeded. Slow down!\n")
                  else:
                      # پاسخ دادن به هر مسیر با همون HTML (حل مشکل favicon و...)
                      self.send_header('Content-type', 'text/html')
                      self.send_header('Cache-Control', 'no-cache')
                      self.end_headers()
                      self.wfile.write(HTML_PAGE.encode())

          class LogPusher(threading.Thread):
              def run(self):
                  time.sleep(10)  # تأخیر اولیه برای اطمینان از وجود لاگ
                  while True:
                      try:
                          subprocess.run(['git', 'add', LOG_FILE], check=True)
                          subprocess.run(['git', 'commit', '-m', 'Auto-update visitor log'], check=True)
                          subprocess.run(['git', 'pull', '--rebase'], check=True)
                          subprocess.run(['git', 'push'], check=True)
                          print("📤 لاگ با موفقیت به مخزن ارسال شد.")
                      except Exception as e:
                          print(f"⚠️ Push ناموفق: {e}")
                      time.sleep(10)

          PORT = 8080
          with socketserver.TCPServer(("0.0.0.0", PORT), LoggingHandler) as httpd:
              print(f"🌐 سرور روی پورت {PORT} آماده است.")
              pusher = LogPusher(daemon=True)
              pusher.start()
              httpd.serve_forever()
          PYEOF

      - name: 🚀 راه‌اندازی سرور و تونل
        env:
          PROTECTION: ${{ github.event.inputs.protection }}
        run: |
          # گرفتن IP عمومی رانر
          RUNNER_IP=$(curl -s ifconfig.me)
          SERVER_PORT=8080
          
          echo "🖥️ IP رانر: $RUNNER_IP"
          echo "🚪 پورت: $SERVER_PORT"
          
          python3 server.py &
          
          # منتظر بمونیم تا سرور واقعاً بالا بیاد
          echo "⏳ منتظر آماده شدن سرور..."
          for i in {1..30}; do
            if curl -s http://localhost:$SERVER_PORT >/dev/null 2>&1; then
              echo "✅ سرور بعد از $i ثانیه آماده شد"
              break
            fi
            sleep 1
          done
          
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:${SERVER_PORT} 2>&1 | tee /tmp/cf-log &
          sleep 12
          URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/cf-log | head -n 1)
          
          echo "🌐 **لینک سایت هدف:** $URL"
          echo "🖥️ **IP رانر:** $RUNNER_IP"
          echo "🚪 **پورت:** $SERVER_PORT"
          
          if [ "$PROTECTION" = "yes" ]; then
            echo "🛡️ محافظت DDoS فعال است (Rate Limit: 20 req/s + 50 burst)."
          else
            echo "⚡ بدون محافظت – تمام درخواست‌ها پذیرفته می‌شوند."
          fi
          
          # ذخیره اطلاعات سرور در فایل
          echo "Server Info" > server_info.txt
          echo "URL: $URL" >> server_info.txt
          echo "Runner IP: $RUNNER_IP" >> server_info.txt
          echo "Port: $SERVER_PORT" >> server_info.txt
          echo "Protection: $PROTECTION" >> server_info.txt
          
          git add server_info.txt
          git commit -m "Add server info" || true
          git push || true
          
          echo "⏱️ سرور تا ۶ ساعت آنلاین می‌ماند."
          sleep 21600
