name: 🏰 Fortress - Advanced L7 Target with WAF

on:
  workflow_dispatch:

jobs:
  fortress:
    runs-on: ubuntu-latest
    steps:
      - name: 🔧 ساخت قلعه (Nginx + ModSecurity)
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx nginx-module-security

          # فعال‌سازی قوانین پیش‌فرض OWASP
          sudo sed -i 's/SecRuleEngine DetectionOnly/SecRuleEngine On/' /etc/nginx/modsec/main.conf

          # اضافه کردن Rate Limiting و سایر دفاع‌ها
          cat << 'NGINX_CONF' | sudo tee /etc/nginx/sites-enabled/fortress
          limit_req_zone $binary_remote_addr zone=attackzone:10m rate=5r/s;

          server {
              listen 8080;
              ModSecurityEnabled on;
              ModSecurityConfig /etc/nginx/modsec/main.conf;

              location / {
                  limit_req zone=attackzone burst=20 nodelay;
                  root /var/www/html;
                  index index.html;
              }
          }
          NGINX_CONF

          # ساخت صفحه
          sudo mkdir -p /var/www/html
          sudo tee /var/www/html/index.html << 'HTML'
          <h1>🏰 Fortress is alive!</h1>
          HTML

          sudo systemctl restart nginx

      - name: 🚀 اجرای قلعه
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8080 2>&1 | tee /tmp/cf-log &
          sleep 15
          URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/cf-log | head -n 1)
          echo "🏰 قلعه مستحکم شما: $URL"
          sleep 21600
